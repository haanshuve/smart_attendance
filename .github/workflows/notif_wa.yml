name: WhatsApp Group Notification

on:
  push:
    branches: [ main, master ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Group Message
        run: |
          curl -X POST 'https://api.fonnte.com/send' \
          -H "Authorization: ${{ secrets.FONNTE_TOKEN }}" \
          -d "target=${{ secrets.WA_GROUP_ID }}" \
          -d "message=📢 *UPDATE PBL SMART ATTENDANCE* 📢%n%nHalo Tim! Raihan baru saja melakukan update kodingan.%n%n📝 *Pesan:* ${{ github.event.head_commit.message }}%n%n📅 Waktu: $(date)"
